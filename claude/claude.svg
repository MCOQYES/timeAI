<svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 50 50">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C17F3E"/>
    </radialGradient>
    <radialGradient id="inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5DEB3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="25" cy="25" r="25" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <circle cx="25" cy="25" r="22" fill="url(#inner)"/>

  <!-- Claude "C" letterform - stylized arc -->
  <path d="M 34 14 
             C 28 10, 18 12, 14 20 
             C 10 28, 13 38, 21 42 
             C 27 45, 35 43, 38 38"
        fill="none"
        stroke="#3D1F00"
        stroke-width="4.5"
        stroke-linecap="round"/>

  <!-- Small decorative dot accent -->
  <circle cx="34" cy="14" r="2.5" fill="#3D1F00"/>
  <circle cx="38" cy="38" r="2.5" fill="#3D1F00"/>
</svg>
