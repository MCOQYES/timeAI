<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { 
            position: absolute; top: 20px; left: 20px; 
            padding: 10px 20px; background: rgba(0,0,0,0.5); 
            color: #0f0; border: 1px solid #0f0; border-radius: 5px;
            cursor: pointer; z-index: 100; letter-spacing: 2px;
            font-size: 12px; transition: 0.3s;
        }
        #ui:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div id="ui" onclick="toggleMovement()">FIBONACCI: <span id="status">ACTIVO</span></div>
    <script>
        let totalPoints = 14400; 
        const baseGoldenAngle = 137.508;
        let movement = true; 
        let offset = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB);
            pixelDensity(1);
        }

        function draw() {
            // Fondo con un toque de "estela" (transparencia sutil)
            // Esto es lo que da la sensación de fluidez extrema al aumentar la velocidad
            background(0);
            
            if (movement) {
                // AUMENTO DE VELOCIDAD (Fase Cinética)
                offset += 0.005; 
            }

            // Cámara inmersiva
            let camZ = movement ? sin(offset * 0.5) * 100 : 0;
            camera(0, 0, camZ, 0, 0, -1, 0, 1, 0);

            // Rotación rápida pero estable
            rotateZ(offset * 0.8); 

            // Pulsación del ángulo (Genera patrones de Moiré que cambian rápido)
            let dynamicAngle = baseGoldenAngle + (movement ? sin(offset * 1.5) * 0.02 : 0);

            for (let i = 0; i < totalPoints; i++) {
                let h = i / totalPoints; 
                let r = (pow(h, 0.7) * (width * 0.45)) + 10; 
                let theta = i * dynamicAngle;
                let z = (h - 0.5) * 1000; 

                let x = r * cos(theta);
                let y = r * sin(theta);

                push();
                translate(x, y, z);

                // Colores eléctricos
                let baseHue = movement ? (frameCount * 0.2) % 360 : 110;
                let hueValue = (baseHue + (h * 80)) % 360;
                
                fill(hueValue, 80, map(i, 0, totalPoints, 100, 20));
                noStroke();

                // Cajas ligeramente más estilizadas
                box(map(i, 0, totalPoints, 2, 8)); 
                pop();
            }
        }

        function toggleMovement() {
            movement = !movement;
            document.getElementById('status').innerText = movement ? "ACTIVO" : "ESTÁTICO";
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
